<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #000000;
  --dark:    #0c0c0c;
  --dark2:   #141414;
  --border:  #1f1f1f;
  --border2: #2e2e2e;
  --red:     #e8281a;
  --red-dim: rgba(232,40,26,0.10);
  --red-bdr: rgba(232,40,26,0.30);
  --white:   #ffffff;
  --grey:    #888888;
  --grey2:   #555555;
  --blue:    #4db8ff;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ━━━ LAYOUT ━━━
   Mobile:  header → video → cards → nav  (vertical stack)
   Desktop: header → [video LEFT | cards RIGHT]  (side by side)
*/

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ━━━ HEADER ━━━ */
.hdr {
  flex-shrink: 0;
  background: var(--black);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 46px;
}
.logo-wrap { display: flex; align-items: center; }
.logo-f { font-size: 19px; font-weight: 900; letter-spacing: -0.03em; color: var(--white); line-height: 1; }
.logo-dot { display: inline-block; width: 5px; height: 5px; background: var(--red); border-radius: 50%; margin: 0 1px 5px 1px; }
.logo-fm { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; color: var(--grey2); text-transform: uppercase; align-self: flex-end; margin-bottom: 1px; margin-left: 2px; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.tag { font-size: 9px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey2); border: 1px solid var(--border2); padding: 3px 7px; border-radius: 2px; }
.prog-rail { height: 2px; background: var(--border); }
.prog-bar  { height: 100%; background: var(--red); transition: width 0.4s ease; }

/* ━━━ MAIN BODY (below header) ━━━ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* ━━━ VIDEO PANEL ━━━ */
.video-panel {
  flex-shrink: 0;
  background: #000;
  border-bottom: 1px solid var(--border);
  position: relative;
}

/* Mobile: 16:9 ratio */
.video-panel {
  width: 100%;
  aspect-ratio: 16/9;
  max-height: 35vh; /* don't let video eat too much on small phones */
}

.video-panel iframe {
  width: 100%; height: 100%;
  border: none; display: block;
}

/* Placeholder shown before user hits play */
.vid-placeholder {
  position: absolute; inset: 0;
  background: #050505;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; cursor: pointer;
  transition: background 0.2s;
}
.vid-placeholder:hover { background: #0a0a0a; }
.vid-placeholder.hidden { display: none; }

.play-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: transform 0.2s;
}
.vid-placeholder:hover .play-circle { transform: scale(1.08); }

.play-label {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--grey2);
}

/* ━━━ CARDS SECTION ━━━ */
.cards-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.counter {
  flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 16px; border-bottom: 1px solid var(--border);
  font-size: 9px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--grey2);
}

/* Card viewport */
.vp {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

.cw {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 10px 14px;
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.28s ease, transform 0.28s ease;
  pointer-events: none;
}
.cw.active { opacity: 1; transform: translateY(0); pointer-events: all; }
.cw.out    { opacity: 0; transform: translateY(-24px); }

.card {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 100%; max-width: 600px;
  max-height: 100%; overflow-y: auto;
  padding: 16px 16px 14px;
  display: flex; flex-direction: column; gap: 11px;
  position: relative;
}
.card::after {
  content: '';
  position: absolute;
  top: 14px; bottom: 14px; left: -1px;
  width: 3px; background: var(--red);
  border-radius: 0 2px 2px 0;
}

.card-eye {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.eye-n { color: var(--red); }
.eye-sep { color: var(--border2); }
.eye-topic { color: var(--grey2); }

.card-hl {
  font-size: clamp(15px, 4.2vw, 21px);
  font-weight: 900; line-height: 1.15;
  letter-spacing: -0.02em; color: var(--white);
}
.card-hl em { font-style: normal; color: var(--red); }

.card-body {
  font-size: 12.5px; line-height: 1.68;
  color: var(--grey); font-weight: 400;
}

/* Timestamp — seeks video, stays on page */
.ts-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--grey2);
  border: 1px solid var(--border2); border-radius: 2px;
  padding: 5px 10px; width: fit-content;
  cursor: pointer; background: transparent;
  transition: border-color 0.2s, color 0.2s;
}
.ts-btn:hover { border-color: var(--red); color: var(--red); }
.ts-pip { color: var(--red); font-size: 6px; }

.ts-hint {
  font-size: 9px; color: var(--grey2);
  letter-spacing: 0.04em; margin-top: -4px;
}

/* i-buttons */
.irow { display: flex; flex-wrap: wrap; gap: 5px; }
.ibtn {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--border2); border-radius: 2px;
  padding: 4px 9px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.07em; text-transform: uppercase;
  cursor: pointer; background: transparent;
  color: var(--grey); transition: all 0.18s; user-select: none;
}
.ibadge {
  width: 12px; height: 12px; border-radius: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 900; flex-shrink: 0;
}
.ibtn.definition   { color: #f0f0f0; border-color: rgba(255,255,255,0.15); }
.ibtn.definition   .ibadge { background: var(--white); color: #000; }
.ibtn.definition:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
.ibtn.context { color: var(--blue); border-color: rgba(77,184,255,0.2); }
.ibtn.context .ibadge { background: var(--blue); color: #000; }
.ibtn.context:hover { background: rgba(77,184,255,0.07); }
.ibtn.why-it-matters { color: var(--red); border-color: var(--red-bdr); }
.ibtn.why-it-matters .ibadge { background: var(--red); color: #fff; }
.ibtn.why-it-matters:hover { background: var(--red-dim); }

/* ━━━ BOTTOM NAV ━━━ */
.bnav {
  flex-shrink: 0;
  height: 50px; background: var(--black);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; padding: 0 14px;
}
.nbtn {
  background: none; border: 1px solid var(--border2); border-radius: 2px;
  padding: 6px 13px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.1em; color: var(--grey);
  cursor: pointer; text-transform: uppercase;
  transition: all 0.18s; display: flex; align-items: center; gap: 4px;
}
.nbtn:hover:not(:disabled) { border-color: var(--white); color: var(--white); }
.nbtn:disabled { opacity: 0.18; cursor: not-allowed; }
.nbtn.prime { background: var(--red); border-color: var(--red); color: var(--white); }
.nbtn.prime:hover { background: #c9231a; border-color: #c9231a; }

.dots { display: flex; gap: 4px; align-items: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); cursor: pointer; transition: all 0.25s; }
.dot.on { background: var(--red); width: 14px; border-radius: 2px; }

/* ━━━ INFO SHEET ━━━ */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.97);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--dark2);
  border-top: 2px solid var(--red);
  border-radius: 14px 14px 0 0;
  width: 100%; max-height: 70vh; overflow-y: auto;
  padding: 22px 18px 40px;
  transform: translateY(20px);
  transition: transform 0.28s ease;
}
.overlay.open .sheet { transform: translateY(0); }
.sh-handle { width: 28px; height: 2px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.sh-type { font-size: 9px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
.sh-type.definition     { color: var(--white); }
.sh-type.context        { color: var(--blue); }
.sh-type.why-it-matters { color: var(--red); }
.sh-term { font-size: 19px; font-weight: 900; color: var(--white); letter-spacing: -0.02em; line-height: 1.2; }
.xbtn { background: var(--border); border: none; border-radius: 2px; padding: 5px 10px; color: var(--grey); font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; flex-shrink: 0; }
.xbtn:hover { background: var(--border2); }
.sh-line { height: 1px; background: var(--border); margin: 12px 0; }
.sh-body { font-size: 14px; line-height: 1.78; color: var(--grey); }

/* ━━━ DESKTOP — side by side ━━━ */
@media (min-width: 768px) {
  .main { flex-direction: row; }

  .video-panel {
    width: 55%;
    flex-shrink: 0;
    max-height: none;
    aspect-ratio: unset;
    border-bottom: none;
    border-right: 1px solid var(--border);
    /* Fill full height of main */
    align-self: stretch;
  }

  .video-panel iframe,
  .vid-placeholder { position: absolute; inset: 0; width: 100%; height: 100%; }
  .video-panel { position: relative; }

  .cards-section { flex: 1; }
}

.card::-webkit-scrollbar,
.sheet::-webkit-scrollbar { width: 2px; }
.card::-webkit-scrollbar-thumb,
.sheet::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>

<script>
const VID_ID = "qGpyXCopCYg";
let videoLoaded = false;

// Load video — either fresh start or seek to timestamp
function startVideo(sec) {
  sec = sec || 0;
  if (!videoLoaded) {
    // First load — initialise the player with autoplay
    const src = `https://www.youtube.com/embed/${VID_ID}?start=${sec}&autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
    document.getElementById('ytFrame').src = src;
    document.getElementById('placeholder').classList.add('hidden');
    videoLoaded = true;
  } else {
    // Already loaded — reload at new timestamp (simplest cross-browser seek)
    const src = `https://www.youtube.com/embed/${VID_ID}?start=${sec}&autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
    document.getElementById('ytFrame').src = src;
  }
}

    btns: [

let cur = 0, anim = false;

function esc(s) { return (s||'').replace(/'/g, "\\'").replace(/\n/g, ' '); }
function tl(t)  { return { definition:'Definition', context:'Context', 'why-it-matters':'Why It Matters' }[t] || t; }

function build() {
  const vp = document.getElementById('vp');
  DATA.forEach((c, i) => {
    const w = document.createElement('div');
    w.className = 'cw' + (i===0 ? ' active' : '');
    w.id = 'cw' + i;
    const bh = c.btns.map(b =>
      `<button class="ibtn ${b.t}" onclick="openX('${b.t}','${esc(b.term)}','${esc(b.txt)}')"><span class="ibadge">i</span>${b.term||tl(b.t)}</button>`
    ).join('');
    w.innerHTML = `
      <div class="card">
        <div class="card-eye">
          <span class="eye-n">INSIGHT ${i+1}/${DATA.length}</span>
          <span class="eye-sep">·</span>
          <span class="eye-topic">${c.topic}</span>
        </div>
        <h2 class="card-hl">${c.hl}</h2>
        <p class="card-body">${c.body}</p>
        <button class="ts-btn" onclick="startVideo(${c.sec})">
          <span class="ts-pip">●</span> ▶ Jump to ${c.ts}
        </button>
        <div class="irow">${bh}</div>
      </div>`;
    vp.appendChild(w);
  });

  const dc = document.getElementById('dc');
  DATA.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0 ? ' on' : '');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
  ui();
}

function go(d) { goTo(cur + d); }
function goTo(idx) {
  if (anim || idx < 0 || idx >= DATA.length || idx === cur) return;
  anim = true;
  document.getElementById('cw'+cur).classList.add('out');
  setTimeout(() => {
    document.getElementById('cw'+cur).classList.remove('active','out');
    cur = idx;
    document.getElementById('cw'+cur).classList.add('active');
    ui(); anim = false;
  }, 265);
}

function ui() {
  const p = Math.round(((cur+1)/DATA.length)*100);
  document.getElementById('pb').style.width = p+'%';
  document.getElementById('cl').textContent = `Insight ${cur+1} of ${DATA.length}`;
  document.getElementById('cp').textContent = p+'%';
  document.getElementById('prevB').disabled = cur===0;
  document.getElementById('nextB').disabled = cur===DATA.length-1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
}

function openX(type, term, txt) {
  const L = { definition:'— Definition', context:'— Context', 'why-it-matters':'— Why It Matters' };
  document.getElementById('st').textContent = (L[type]||type).toUpperCase();
  document.getElementById('st').className = 'sh-type ' + type;
  document.getElementById('sm').textContent = term || tl(type);
  document.getElementById('sb').textContent = txt;
  document.getElementById('ov').classList.add('open');
}
function closeX()  { document.getElementById('ov').classList.remove('open'); }
function maybeX(e) { if (e.target === document.getElementById('ov')) closeX(); }

// Swipe on card area
let tx=0, ty=0;
document.getElementById('vp').addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('vp').addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40) go(dx<0?1:-1);
},{passive:true});

// Keyboard
document.addEventListener('keydown', e=>{
  if(document.getElementById('ov').classList.contains('open')){if(e.key==='Escape')closeX();return;}
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')   go(-1);
});

build();
</script>
