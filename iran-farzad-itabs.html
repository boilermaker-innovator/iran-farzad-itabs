<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Free Iran — FARZAD.FM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #000000;
  --dark:    #0c0c0c;
  --dark2:   #141414;
  --border:  #1f1f1f;
  --border2: #2e2e2e;
  --red:     #e8281a;
  --red-dim: rgba(232,40,26,0.10);
  --red-bdr: rgba(232,40,26,0.30);
  --white:   #ffffff;
  --grey:    #888888;
  --grey2:   #555555;
  --blue:    #4db8ff;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ━━━ HEADER ━━━ */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--black);
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 50px;
  border-bottom: 1px solid var(--border);
}
.logo-wrap { display: flex; align-items: center; }
.logo-f { font-size: 21px; font-weight: 900; letter-spacing: -0.03em; color: var(--white); line-height: 1; }
.logo-dot { display: inline-block; width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin: 0 1px 5px 1px; }
.logo-fm { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; color: var(--grey2); text-transform: uppercase; align-self: flex-end; margin-bottom: 2px; margin-left: 2px; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.tag { font-size: 9px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey2); border: 1px solid var(--border2); padding: 3px 7px; border-radius: 2px; }

/* ▶ WATCH button now opens in-page player */
.watch-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--red); color: var(--white);
  border: none; border-radius: 3px;
  padding: 6px 11px; font-size: 10px; font-weight: 800;
  letter-spacing: 0.07em; text-transform: uppercase;
  cursor: pointer; transition: background 0.15s;
}
.watch-btn:hover { background: #c92316; }

.prog-rail { height: 2px; background: var(--border); }
.prog-bar  { height: 100%; background: var(--red); transition: width 0.4s ease; }

.counter {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 16px; border-bottom: 1px solid var(--border);
  font-size: 9px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--grey2);
  background: var(--black);
}

/* ━━━ CARDS ━━━ */
.vp {
  position: fixed;
  top: 86px; bottom: 56px;
  left: 0; right: 0;
  overflow: hidden;
}

.cw {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 12px 16px;
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}
.cw.active { opacity: 1; transform: translateY(0); pointer-events: all; }
.cw.out    { opacity: 0; transform: translateY(-28px); }

.card {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 100%; max-width: 500px;
  max-height: 100%; overflow-y: auto;
  padding: 20px 18px 16px;
  display: flex; flex-direction: column; gap: 13px;
  position: relative;
}
.card::after {
  content: '';
  position: absolute;
  top: 18px; bottom: 18px; left: -1px;
  width: 3px; background: var(--red);
  border-radius: 0 2px 2px 0;
}

.card-eye {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.eye-n { color: var(--red); }
.eye-sep { color: var(--border2); }
.eye-topic { color: var(--grey2); }

.card-hl {
  font-size: clamp(17px, 5vw, 23px);
  font-weight: 900; line-height: 1.15;
  letter-spacing: -0.02em; color: var(--white);
}
.card-hl em { font-style: normal; color: var(--red); }

.card-body {
  font-size: 13px; line-height: 1.72;
  color: var(--grey); font-weight: 400;
}

/* ── Timestamp button — plays in-page ── */
.ts-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--grey2);
  border: 1px solid var(--border2); border-radius: 2px;
  padding: 5px 10px; width: fit-content;
  cursor: pointer; background: transparent;
  transition: border-color 0.2s, color 0.2s;
}
.ts-btn:hover { border-color: var(--red); color: var(--red); }
.ts-pip { color: var(--red); font-size: 6px; }
.ts-play { font-size: 9px; }

/* i-buttons */
.irow { display: flex; flex-wrap: wrap; gap: 6px; }
.ibtn {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--border2); border-radius: 2px;
  padding: 5px 10px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; background: transparent;
  color: var(--grey); transition: all 0.18s; user-select: none;
}
.ibadge {
  width: 13px; height: 13px; border-radius: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 900; flex-shrink: 0;
}
.ibtn.definition   { color: #f0f0f0; border-color: rgba(255,255,255,0.15); }
.ibtn.definition   .ibadge { background: var(--white); color: #000; }
.ibtn.definition:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
.ibtn.context { color: var(--blue); border-color: rgba(77,184,255,0.2); }
.ibtn.context .ibadge { background: var(--blue); color: #000; }
.ibtn.context:hover { background: rgba(77,184,255,0.07); }
.ibtn.why-it-matters { color: var(--red); border-color: var(--red-bdr); }
.ibtn.why-it-matters .ibadge { background: var(--red); color: #fff; }
.ibtn.why-it-matters:hover { background: var(--red-dim); }

/* ━━━ VIDEO OVERLAY ━━━ */
.vid-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.96);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
  padding: 20px 16px;
}
.vid-overlay.open { opacity: 1; pointer-events: all; }

.vid-header {
  width: 100%; max-width: 560px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.vid-label {
  font-size: 10px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--grey2);
}
.vid-close {
  background: var(--border); border: none; border-radius: 2px;
  padding: 5px 10px; color: var(--grey);
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer;
}
.vid-close:hover { background: var(--border2); color: var(--white); }

.vid-frame-wrap {
  width: 100%; max-width: 560px;
  aspect-ratio: 16/9;
  border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border2);
  background: #000;
}
.vid-frame-wrap iframe {
  width: 100%; height: 100%; border: none; display: block;
}

.vid-footer {
  width: 100%; max-width: 560px;
  margin-top: 10px;
  font-size: 10px; color: var(--grey2);
  text-align: center; letter-spacing: 0.04em;
}

/* ━━━ INFO SHEET ━━━ */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.97);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  background: var(--dark2);
  border-top: 2px solid var(--red);
  border-radius: 14px 14px 0 0;
  width: 100%; max-height: 75vh; overflow-y: auto;
  padding: 22px 18px 40px;
  transform: translateY(20px);
  transition: transform 0.28s ease;
}
.overlay.open .sheet { transform: translateY(0); }

.sh-handle { width: 28px; height: 2px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.sh-type { font-size: 9px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
.sh-type.definition     { color: var(--white); }
.sh-type.context        { color: var(--blue); }
.sh-type.why-it-matters { color: var(--red); }
.sh-term { font-size: 19px; font-weight: 900; color: var(--white); letter-spacing: -0.02em; line-height: 1.2; }
.xbtn {
  background: var(--border); border: none; border-radius: 2px;
  padding: 5px 10px; color: var(--grey);
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer; flex-shrink: 0;
}
.xbtn:hover { background: var(--border2); }
.sh-line { height: 1px; background: var(--border); margin: 12px 0; }
.sh-body { font-size: 14px; line-height: 1.78; color: var(--grey); }

/* ━━━ BOTTOM NAV ━━━ */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 56px; background: var(--black);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; padding: 0 16px; z-index: 200;
}
.nbtn {
  background: none; border: 1px solid var(--border2); border-radius: 2px;
  padding: 7px 14px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.1em; color: var(--grey);
  cursor: pointer; text-transform: uppercase;
  transition: all 0.18s; display: flex; align-items: center; gap: 4px;
}
.nbtn:hover:not(:disabled) { border-color: var(--white); color: var(--white); }
.nbtn:disabled { opacity: 0.18; cursor: not-allowed; }
.nbtn.prime { background: var(--red); border-color: var(--red); color: var(--white); }
.nbtn.prime:hover { background: #c9231a; border-color: #c9231a; }

.dots { display: flex; gap: 4px; align-items: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); cursor: pointer; transition: all 0.25s; }
.dot.on { background: var(--red); width: 14px; border-radius: 2px; }

.card::-webkit-scrollbar, .sheet::-webkit-scrollbar { width: 2px; }
.card::-webkit-scrollbar-thumb, .sheet::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<!-- Header -->

<!-- ── In-page video overlay ── -->

    <div class="sh-body" id="sb"></div>

</div>

    topic: "Farzad's Prediction",
    hl: "Top-10 Global Economy. <em>25 Years.</em>",
    body: "Wave 1: Sanctions relief → double-digit GDP immediately (12.5% in 2016 just from partial relief, regime still in power). Wave 2: Diaspora capital and expertise floods back. Wave 3: AI leapfrog — decades skipped overnight. Farzad's prediction on record: top-20 in 15 years, top-10 in 25.",
    ts: "36:33", sec: 2193,
    btns: [
      { t:"definition", term:"The 2016 proof of concept", txt:"When sanctions were temporarily lifted under the nuclear deal, Iran's GDP grew 12.5% in a single year — its only double-digit growth in decades. That was with the regime still in power, brain drain ongoing, and zero AI. Imagine full sanctions relief, democratic governance, diaspora return, and the AI tailwind all hitting simultaneously." },
      { t:"context", term:"The honest bear case", txt:"Farzad addresses Libya (collapsed into militia chaos), Iraq (gave rise to ISIS), Syria (decade of civil war). He argues Iran is categorically different: 90M educated people vs Libya's 6M, a massive globally connected diaspora, extraordinary civil society that organised mass protests at enormous cost, and — critically — it's 2026, not 2003." },
      { t:"why-it-matters", term:"The core thesis", txt:"When a system has all the ingredients for explosive growth but is held back by a single constraint, removing that constraint doesn't produce slow linear improvement — it erupts. The people who invented algebra, wrote the first declaration of human rights, and built the world's first university hospital are still there. 90 million of them. Young, educated, and now hopefully free." }
    ]
  }
];

let cur = 0, anim = false;

function esc(s) { return (s||'').replace(/'/g, "\\'").replace(/\n/g, ' '); }
function tl(t)  { return { definition:'Definition', context:'Context', 'why-it-matters':'Why It Matters' }[t] || t; }

// ── Video player ──
function openVideo(sec) {
  const src = `https://www.youtube.com/embed/${VID_ID}?start=${sec}&autoplay=1&rel=0&modestbranding=1`;
  document.getElementById('ytFrame').src = src;
  document.getElementById('vidOv').classList.add('open');
}

function closeVideo() {
  document.getElementById('ytFrame').src = ''; // stops playback
  document.getElementById('vidOv').classList.remove('open');
}

function maybeCloseVid(e) {
  if (e.target === document.getElementById('vidOv')) closeVideo();
}

// ── Build cards ──
function build() {
  const vp = document.getElementById('vp');
  DATA.forEach((c, i) => {
    const w = document.createElement('div');
    w.className = 'cw' + (i===0 ? ' active' : '');
    w.id = 'cw' + i;
    const bh = c.btns.map(b =>
      `<button class="ibtn ${b.t}" onclick="openX('${b.t}','${esc(b.term)}','${esc(b.txt)}')"><span class="ibadge">i</span>${b.term||tl(b.t)}</button>`
    ).join('');
    w.innerHTML = `
      <div class="card">
        <div class="card-eye">
          <span class="eye-n">INSIGHT ${i+1}/${DATA.length}</span>
          <span class="eye-sep">·</span>
          <span class="eye-topic">${c.topic}</span>
        </div>
        <h2 class="card-hl">${c.hl}</h2>
        <p class="card-body">${c.body}</p>
        <button class="ts-btn" onclick="openVideo(${c.sec})">
          <span class="ts-pip">●</span>
          <span class="ts-play">▶</span>
          Play from ${c.ts}
        </button>
        <div class="irow">${bh}</div>
      </div>`;
    vp.appendChild(w);
  });

  const dc = document.getElementById('dc');
  DATA.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0 ? ' on' : '');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
  ui();
}

function go(d)  { goTo(cur + d); }
function goTo(idx) {
  if (anim || idx < 0 || idx >= DATA.length || idx === cur) return;
  anim = true;
  const o = document.getElementById('cw'+cur);
  const n = document.getElementById('cw'+idx);
  o.classList.add('out');
  setTimeout(() => { o.classList.remove('active','out'); n.classList.add('active'); cur=idx; ui(); anim=false; }, 290);
}

function ui() {
  const p = Math.round(((cur+1)/DATA.length)*100);
  document.getElementById('pb').style.width = p+'%';
  document.getElementById('cl').textContent = `Insight ${cur+1} of ${DATA.length}`;
  document.getElementById('cp').textContent = p+'%';
  document.getElementById('prevB').disabled = cur===0;
  document.getElementById('nextB').disabled = cur===DATA.length-1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
}

function openX(type, term, txt) {
  const L = { definition:'— Definition', context:'— Context', 'why-it-matters':'— Why It Matters' };
  document.getElementById('st').textContent = (L[type]||type).toUpperCase();
  document.getElementById('st').className = 'sh-type ' + type;
  document.getElementById('sm').textContent = term || tl(type);
  document.getElementById('sb').textContent = txt;
  document.getElementById('ov').classList.add('open');
}
function closeX()  { document.getElementById('ov').classList.remove('open'); }
function maybeX(e) { if (e.target === document.getElementById('ov')) closeX(); }

// Swipe
let tx=0, ty=0;
document.getElementById('vp').addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('vp').addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40) go(dx<0?1:-1);
},{passive:true});

// Keyboard
document.addEventListener('keydown', e=>{
  if(document.getElementById('vidOv').classList.contains('open')){if(e.key==='Escape')closeVideo();return;}
  if(document.getElementById('ov').classList.contains('open')){if(e.key==='Escape')closeX();return;}
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')   go(-1);
});

build();
</script>
</body>
</html>
